<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Help – PuneRide</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="landing-body">
<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
</div>
<nav>
  <div class="logo"><span class="logo-bus">🚌</span> PuneRide</div>
  <div class="nav-center">
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="dashboard.html" data-i18n="nav_tracker">Live Tracker</a>
    <a href="about.html" data-i18n="nav_about">About</a>
    <a href="help.html" class="active" data-i18n="nav_help">Help</a>
  </div>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="hi" onclick="setLang('hi')">हि</button>
      <button class="lang-btn" data-lang="mr" onclick="setLang('mr')">म</button>
    </div>
  </div>
</nav>
<div class="page-wrap">
  <h1 data-i18n="help_title">Help &amp; FAQ</h1>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq1_q">How do I use the Live Tracker?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq1_a"></div></div>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq2_q">How does GPS work?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq2_a"></div></div>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq3_q">Why no direct bus?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq3_a"></div></div>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq4_q">Which stops are on which route?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq4_a"></div></div>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq5_q">How is ETA calculated?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq5_a"></div></div>
  <div class="faq"><div class="faq-q" onclick="tog(this)"><span data-i18n="faq6_q">How do I run locally?</span><span class="arrow">+</span></div><div class="faq-a" data-i18n="faq6_a"></div></div>
</div>
<footer>
  <div class="footer-inner">
    <span>🚌 PuneRide</span>
    <span data-i18n="footer_built">Built with Flask · Leaflet · ML · 2026</span>
    <span data-i18n="footer_demo">Demo Project · PMPML Inspired</span>
  </div>
</footer>
<script src="i18n.js"></script>
<script>
function tog(el) {
  const a = el.nextElementSibling, ar = el.querySelector('.arrow');
  const open = a.style.display === 'block';
  a.style.display = open ? 'none' : 'block';
  ar.textContent = open ? '+' : '−';
}
document.querySelectorAll('.faq-a').forEach(a => {
  a.style.display = 'none';
});
</script>
</body>
</html>
